<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codédex March Challenge</title>
    <link rel="icon" type="image/png" href="Assets/codédex.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Pixelify+Sans:wght@400..700&family=Share+Tech&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <!-- Background Music Audio Element -->
    <audio id="bg-music" src="Assets/music.mp3" loop preload="auto"></audio>
    <div class="container">
    
    <div class="header-section">
        <h1>Codédex March Challenge</h1>
        <div class="progress-container">

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <span class="progress-text">23/30</span>
        </div>
    </div>
        <div class="buttons">
            <button onclick="window.open('https://www.codedex.io/community/monthly-challenge/f6fcKs3xRKWhJQdlkKGV')">Start Challenge</button>
         </div>
        <ul id="solution-list"></ul>
    </div>
    <footer>Made with 💖 by <a style="color: #0051ff;" href="https://www.codedex.io/@debmalya">Debmalya</a></footer>

    <a class="github" href="https://github.com/d3vdebug/codedex_march_challenge_2026" target="_blank" class="github-icon">
        <i class="fab fa-github"></i>
    </a>

    <div id="code-viewer" class="code-viewer"></div>
    <!-- Music Toggle Button -->
    <button id="music-toggle" class="music-toggle" title="Toggle Music">
        <span id="music-icon" class="fa fa-volume-up"></span>
    </button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
